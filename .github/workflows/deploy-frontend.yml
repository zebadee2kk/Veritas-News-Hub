name: Deploy Frontend

on:
  push:
    branches: ["master"]
    paths:
      - "veritas-global-intelligence/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: veritas-global-intelligence/package-lock.json

      - name: Install dependencies
        working-directory: veritas-global-intelligence
        run: npm ci

      - name: Build frontend
        working-directory: veritas-global-intelligence
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy veritas-global-intelligence/dist
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
            --branch=master
